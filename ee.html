<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك الكوميكس العربي الاحترافي - نظام التناسق البصري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --comic-bg: #0b0f1a;
            --accent-gold: #fbbf24;
        }

        body {
            background-color: var(--comic-bg);
            color: #f1f5f9;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        .comic-canvas {
            background-color: #ffffff;
            width: 210mm;
            min-height: 297mm;
            padding: 40px;
            margin: 40px auto;
            color: #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border: 12px solid #000;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: visible; 
        }

        .comic-header {
            text-align: center;
            border-bottom: 10px double #000;
            padding-bottom: 25px;
            margin-bottom: 40px;
        }

        .comic-title {
            font-family: 'Aref Ruqaa', serif;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.2;
        }

        .panels-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .panel {
            position: relative;
            background: #f0f0f0;
            border: 5px solid #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
            page-break-inside: avoid;
        }

        .panel-full { min-height: 450px; width: 100%; }
        .panel-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            min-height: 380px; 
            page-break-inside: avoid;
        }

        .panel-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .caption-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 20px;
            z-index: 20;
        }

        .speech-bubble {
            position: absolute;
            background: white;
            border: 3px solid black;
            padding: 12px 18px;
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            font-weight: 700;
            max-width: 80%;
            box-shadow: 6px 6px 0px black;
            color: black;
            line-height: 1.6;
            pointer-events: auto;
        }

        .pos-tr { top: 20px; right: 20px; border-radius: 20px 0 20px 20px; }
        .pos-bl { bottom: 20px; left: 20px; border-radius: 20px 20px 20px 0; }

        .side-panel {
            position: fixed;
            left: 30px;
            top: 30px;
            width: 380px;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid #334155;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .floating-download {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            background-color: #e11d48;
            color: white;
            padding: 20px 30px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(225, 29, 72, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid white;
        }

        .loader-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .progress-container {
            width: 300px;
            height: 8px;
            background: #222;
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gold);
            width: 0%;
            transition: width 0.4s ease;
        }

        @media print {
            .no-print { display: none !important; }
            .comic-canvas { margin: 0; border: none; width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>

    <button onclick="exportPDF()" class="floating-download no-print shadow-2xl">
        <span class="text-2xl">📥</span>
        تحميل القصة (PDF)
    </button>

    <div class="loader-screen" id="mainLoader">
        <div class="text-7xl animate-pulse mb-4">🎨</div>
        <h2 class="text-3xl font-bold text-white font-[Aref Ruqaa]" id="loadStatus">جاري توليد القصة...</h2>
        <p class="text-gray-400 mt-2" id="loadSubStatus">استخدام تقنية Banana Nano لتصوير مشاهدك</p>
        <div class="progress-container">
            <div class="progress-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="side-panel no-print shadow-2xl">
        <h3 class="text-2xl font-black text-amber-500 mb-4 flex items-center gap-2">
            <span>⚔️</span> المحرك الملحمي v3.1
        </h3>
        <textarea id="storyInput" class="w-full bg-black/50 border border-slate-700 rounded-2xl p-4 text-white mb-6 focus:ring-2 focus:ring-amber-500 outline-none transition-all" rows="7" placeholder="اكتب قصتك الملحمية هنا..."></textarea>
        <div class="space-y-4">
            <button id="igniteBtn" onclick="igniteEngine()" class="w-full bg-amber-600 hover:bg-amber-500 text-black font-black py-4 rounded-2xl shadow-xl transform active:scale-95 transition-all text-lg mb-2">
                توليد الكوميكس
            </button>
            <button onclick="location.reload()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition border border-slate-700">إعادة البدء</button>
        </div>
    </div>

    <div id="captureZone">
        <div class="comic-canvas" id="mainCanvas">
            <header class="comic-header">
                <h1 id="comicTitle" class="comic-title">بانتظار وحي الخيال...</h1>
            </header>
            <div class="panels-grid" id="panelsGrid"></div>
        </div>
    </div>

    <script>
        const apiKey = "";

        // دالة لتنظيف النص من علامات الترقيم الزائدة وعلامات الاقتباس
        function cleanText(text) {
            if (!text) return "";
            // إزالة علامات الاقتباس العلوية والمزدوجة والرموز الغريبة في البداية والنهاية
            return text.replace(/^["'«„]+|["'»“]+$/g, '').trim();
        }

        async function igniteEngine() {
            const input = document.getElementById('storyInput').value;
            if (!input) return;

            const loader = document.getElementById('mainLoader');
            const progress = document.getElementById('progressBar');
            const grid = document.getElementById('panelsGrid');
            const titleEl = document.getElementById('comicTitle');
            const igniteBtn = document.getElementById('igniteBtn');

            igniteBtn.disabled = true;
            loader.style.display = 'flex';
            progress.style.width = '10%';
            grid.innerHTML = '';

            try {
                const logicPrompt = `Create a detailed comic script for: "${input}". 
                Ensure dialogue is natural and punchy Arabic.
                Respond ONLY with JSON:
                {
                    "title": "Arabic Title",
                    "style": "Description of art style, characters, and lighting for consistency",
                    "scenes": [{"text": "Arabic Dialogue", "visual": "English visual description", "wide": false}]
                }`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: logicPrompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("Logic API Error");
                const result = await response.json();
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                
                titleEl.innerText = cleanText(data.title);
                progress.style.width = '30%';

                const imagePromises = [];
                let currentRow = null;

                for (let i = 0; i < data.scenes.length; i++) {
                    const scene = data.scenes[i];
                    let container;

                    if (scene.wide || i === 0) {
                        const row = document.createElement('div');
                        row.className = 'panel-full panel';
                        grid.appendChild(row);
                        container = row;
                        currentRow = null;
                    } else {
                        if (!currentRow) {
                            currentRow = document.createElement('div');
                            currentRow.className = 'panel-row';
                            grid.appendChild(currentRow);
                        }
                        const p = document.createElement('div');
                        p.className = 'panel';
                        currentRow.appendChild(p);
                        container = p;
                        if (currentRow.children.length >= 2) currentRow = null;
                    }

                    const imgId = `img-${i}`;
                    const cleanedDialogue = cleanText(scene.text);

                    container.innerHTML = `
                        <img id="${imgId}" src="https://placehold.co/800x600?text=رسم+المشهد..." class="panel-img">
                        <div class="caption-layer">
                            <div class="speech-bubble ${i % 2 === 0 ? 'pos-tr' : 'pos-bl'}">${cleanedDialogue}</div>
                        </div>
                    `;

                    imagePromises.push(generateImageWithNano(data.style, scene.visual, imgId, progress, i, data.scenes.length));
                }

                await Promise.all(imagePromises);
                progress.style.width = '100%';
                setTimeout(() => { 
                    loader.style.display = 'none'; 
                    igniteBtn.disabled = false;
                }, 1000);

            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                igniteBtn.disabled = false;
            }
        }

        async function generateImageWithNano(style, visual, imgId, progress, index, total) {
            const prompt = `Professional manga art, high contrast. ${style}. ${visual}. Cinematic lighting, detailed background, no text.`;
            
            for (let attempt = 0; attempt < 5; attempt++) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseModalities: ['IMAGE'] }
                        })
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const result = await res.json();
                    const b64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    
                    if (b64) {
                        const img = document.getElementById(imgId);
                        if (img) img.src = `data:image/png;base64,${b64}`;
                        
                        const currentP = 30 + ((70 / total) * (index + 1));
                        progress.style.width = `${currentP}%`;
                        return;
                    }
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
                }
            }
        }

        function exportPDF() {
            const element = document.getElementById('mainCanvas');
            const opt = {
                margin: [10, 0, 10, 0],
                filename: 'arabic_comic.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    letterRendering: true,
                    scrollY: 0,
                    windowHeight: element.scrollHeight 
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
